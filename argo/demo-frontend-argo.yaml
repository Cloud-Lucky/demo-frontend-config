apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-fe-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cloud-Lucky/demo-frontend-config.git
    targetRevision: HEAD
    path: demo-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
     prune: true
     selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true                  
