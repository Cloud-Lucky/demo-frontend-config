apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: demo
  labels:
    app: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo-container
        image: laxmireddy870113/frontend:v1
        ports:
        - containerPort: 4000



